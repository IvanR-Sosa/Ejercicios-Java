#puerto del servidor
server.port=8080

#Configuration  H2 Database(In-memory database development)
spring.datasource.url=jdbc:h2:mem:employeedb
spring.datasourse.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#Configuration JPA
spring.japa.database-platfonrm=org.hibernate.dialect.H2Dialect
spring,jpa.hibernate.ddl-auto=update
spring.japa.show-sql=true

#Console H2 (to see database in the browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#CORS (allow requests from React)
spring.web.cors.allowed-origin=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*